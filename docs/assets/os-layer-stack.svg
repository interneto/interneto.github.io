  <text x="711" y="31" text-anchor="middle" fill="#e9d5ff" font-size="14" font-weight="700">macOS</text>

  <!-- ======= ROW 0 — APPLICATIONS (y=48) ======= -->
  <rect x="16"  y="48" width="266" height="72" rx="3" fill="#92400e"/>
